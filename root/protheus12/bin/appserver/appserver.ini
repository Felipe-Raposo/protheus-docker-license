[ENVIRONMENT]
SourcePath=/protheus12/data/apo/
RPOCustom=/protheus12/data/apo/custom.rpo
RootPath=/protheus12/data/
StartPath=/system/
RpoDb=SQLite
RpoLanguage=PORTUGUESE
RpoVersion=120
LocalFiles=CTREE
DBDataBase=SQLite
DBAlias=SYSTEM
DBServer=localhost
startSysInDB=1
TOPMemoMega=1
FWLOGMSG_DEBUG=0
FWFRAME_TRACELOG=0

[DRIVERS]
Active=TCP
MultiProtocolPortSecure=0
MultiProtocolPort=1

[TCP]
TYPE=TCPIP
Port=1234

[LICENSESERVER]
Enable=1
Port=5555
ShowStatus=0
EnableNumber=1
LicenseFile=lsinitialize.inf
IPCGOTIMEOUT=45000
IPCRETURNTIMEOUT=90000
NUMBERVAL=1
AUTOSAVENUMBER=1
STATELESSREUSECONN=60

[LICENSECLIENT]
Server=LOCALHOST
Port=5555
Enable=1

[General]
BUILDKILLUSERS=1
CONSOLELOG=1
CONSOLE=1
DebugThreadUsedmemory=0
ThreadMemwarning=0
MaxStringSize=500
IPC_ActiveTimeOut=300
ASyncConsoleLog=0
CanAcceptDebugger=0
CanAcceptRPC=0
SQLITE_IntegrityCheck=1
SQLITE_CheckImproperShutdown=2
SQLITE_DBSysRecovery=1

[ONSTART]
jobs=LSInit
refreshRate=300

[LSInit]
Main=LSInitialize
Environment=Environment

[SSLConfigure]
SSL2 = 0
SSL3 = 1
TLS1_0 = 1
TLS1_1 = 1
TLS1_2 = 1
BUGS = 0
SecondCertificateClient=/protheus12/data/certs/licenseservercloud.cer
Verbose = 0

[WEBAPP]
Port=1234
HideParamsForm=1
LastMainProg=TOTVSLSMONITOR
EnvServer=Environment

[WEBMONITOR]
ENABLE=0

[APP_MONITOR]
enable=0
